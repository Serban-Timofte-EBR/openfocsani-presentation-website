<!DOCTYPE html>
<html lang="ro" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Harta Banilor | Open Focșani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        #map-canvas { touch-action: pan-x pan-y; height: 100%; width: 100%; }
        .overflow-y-auto { -webkit-overflow-scrolling: touch; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="h-full flex flex-col bg-white overflow-hidden">

    <header class="h-16 border-b border-slate-200 flex items-center shrink-0 z-[100] bg-white px-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-xs">OF</div>
                <div class="flex flex-col">
                    <span class="font-bold text-slate-900 leading-none text-sm">Open Focșani</span>
                    <span class="text-[9px] text-slate-500 uppercase font-bold tracking-widest">Harta Investițiilor</span>
                </div>
            </a>
            <nav class="hidden md:flex items-center space-x-6 text-sm font-semibold text-slate-600">
                <a href="index.html" class="hover:text-blue-600">Acasă</a>
                <a href="harta-investitii.html" class="text-blue-600">Harta Investițiilor</a>
                <a href="vezifocsani.html" class="hover:text-blue-600">Vezi</a>
                <a href="contact.html" class="hover:text-blue-600">Contact</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        <aside class="w-full md:w-[400px] bg-white border-r border-slate-200 flex flex-col z-50 order-2 md:order-1 h-[60%] md:h-full shadow-2xl md:shadow-none">
            <div class="p-5 shrink-0 bg-white border-b border-slate-50">
                <h1 class="text-xl font-black text-slate-900 leading-tight mb-4">Analiză Investiții</h1>
                
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Total Investit</p>
                        <p id="total-amount" class="text-base font-black text-blue-600">0 RON</p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">Nr. Proiecte</p>
                        <p id="total-count" class="text-base font-black text-slate-800">0</p>
                    </div>
                </div>

                <div class="space-y-3">
                    <div class="relative">
                        <label class="absolute -top-2 left-3 bg-white px-1 text-[9px] font-black text-slate-400 uppercase">Perioada</label>
                        <select id="time-period" class="w-full border border-slate-200 rounded-lg p-3 text-xs font-bold bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="all">Toate datele disponibile</option>
                            <option value="2025-H2">Iulie - Decembrie 2025</option>
                            <option value="2026-H1">Ianuarie - Martie 2026</option>
                        </select>
                    </div>
                    <div class="relative">
                        <label class="absolute -top-2 left-3 bg-white px-1 text-[9px] font-black text-slate-400 uppercase">Zonă Consilieri</label>
                        <select id="zone-filter" class="w-full border border-slate-200 rounded-lg p-3 text-xs font-bold bg-slate-50 outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="toate">Întreg Municipiul</option>
                            <option value="1">Zona 1 - Centru</option>
                            <option value="2">Zona 2 - Obor</option>
                            <option value="3">Zona 3 - Est</option>
                            <option value="4">Zona 4 - Vest</option>
                            <option value="5">Zona 5 - Sud</option>
                            <option value="6">Zona 6 - Mîndrești</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="investment-list" class="flex-1 overflow-y-auto custom-scroll divide-y divide-slate-100 pb-10">
                </div>
        </aside>

        <section class="flex-1 relative order-1 md:order-2 h-[40%] md:h-full">
            <div id="map-canvas"></div>
        </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="harta-investitii/js/dashboard.js"></script>
</body>
</html>
