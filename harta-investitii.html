<!doctype html>
<html lang="ro" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Harta Banilor | Open Focșani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .leaflet-container {
        font-family: "Inter", sans-serif !important;
      }
      #map-canvas {
        height: 100%;
        width: 100%;
        z-index: 10;
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-thumb {
        background: #e2e8f0;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="h-full overflow-hidden bg-slate-50">
    <header
      class="bg-white border-b border-slate-200 h-16 flex items-center shrink-0 z-50 relative"
    >
      <div class="container mx-auto px-4 flex justify-between items-center">
        <a href="index.html" class="flex flex-col">
          <span class="font-bold text-slate-900 leading-none"
            >Open Focșani</span
          >
          <span
            class="text-[10px] text-slate-500 uppercase tracking-wider font-semibold"
            >Audit Civic</span
          >
        </a>
        <nav
          class="hidden md:flex items-center space-x-6 text-sm font-medium text-slate-600"
        >
          <a href="index.html" class="hover:text-blue-600 transition">Acasă</a>
          <a
            href="harta-investitii.html"
            class="text-blue-600 border-b-2 border-blue-600 pb-1"
            >Harta Banilor</a
          >
          <a href="contact.html" class="hover:text-blue-600 transition"
            >Contact</a
          >
        </nav>
      </div>
    </header>

    <main
      class="flex flex-col md:flex-row h-[calc(100vh-64px)] overflow-hidden"
    >
      <aside
        class="w-full md:w-[400px] bg-white border-r border-slate-200 flex flex-col z-40 shadow-xl md:shadow-none order-2 md:order-1 h-1/2 md:h-full"
      >
        <div class="p-6 border-b border-slate-100 shrink-0">
          <h1 class="text-xl font-bold text-slate-900">Analiză Investiții</h1>
          <p
            class="text-xs text-slate-500 mt-1 uppercase font-bold tracking-tighter"
          >
            Municipiul Focșani
          </p>

          <div class="grid grid-cols-2 gap-4 mt-6">
            <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
              <p class="text-[10px] font-bold text-slate-400 uppercase">
                Buget Total
              </p>
              <p id="total-amount" class="text-lg font-bold text-blue-600">
                0 RON
              </p>
            </div>
            <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
              <p class="text-[10px] font-bold text-slate-400 uppercase">
                Nr. Lucrări
              </p>
              <p id="total-count" class="text-lg font-bold text-slate-800">0</p>
            </div>
          </div>

          <div class="flex flex-col space-y-3 mt-4">
            <div class="flex-1">
              <label class="text-[10px] font-bold text-slate-400 uppercase ml-1"
                >Perioada</label
              >
              <select
                id="time-period"
                class="w-full mt-1 bg-white border border-slate-200 rounded-lg p-2 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none"
              >
                <option value="all">Toate datele disponibile</option>
                <option value="2025-H2">Iulie - Decembrie 2025</option>
                <option value="2026-H1">Ianuarie - Martie 2026</option>
              </select>
            </div>
            <div class="flex-1">
              <label class="text-[10px] font-bold text-slate-400 uppercase ml-1"
                >Zona Consilieri</label
              >
              <select
                id="zone-filter"
                class="w-full mt-1 bg-white border border-slate-200 rounded-lg p-2 text-sm font-medium focus:ring-2 focus:ring-blue-500 outline-none"
              >
                <option value="toate">Întreg Municipiul</option>
                <option value="1">Zona 1 - Centru</option>
                <option value="2">Zona 2 - Obor</option>
                <option value="3">Zona 3 - Est</option>
                <option value="4">Zona 4 - Vest</option>
                <option value="5">Zona 5 - Sud</option>
                <option value="6">Zona 6 - Mîndrești</option>
              </select>
            </div>
          </div>
        </div>

        <div
          id="investment-list"
          class="flex-1 overflow-y-auto divide-y divide-slate-50"
        ></div>
      </aside>

      <section class="flex-1 relative order-1 md:order-2 h-1/2 md:h-full">
        <div id="map-canvas"></div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="harta-investitii/js/dashboard.js"></script>
  </body>
</html>
