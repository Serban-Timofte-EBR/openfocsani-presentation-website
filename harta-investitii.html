<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Harta Investițiilor | Open Focșani</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="harta-investitii/css/dashboard.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="site-header">
      <nav class="navbar">
        <div class="navbar-inner container">
          <a href="index.html" class="logo">
            <span class="logo-title">Open Focsani</span>
          </a>
          <div class="nav-links">
            <a href="index.html">Acasă</a>
            <a href="harta-investitii.html" class="active">Harta Banilor</a>
            <a href="contact.html">Contact</a>
          </div>
        </div>
      </nav>
    </header>

    <div class="filter-overlay">
      <div class="pill-container">
        <div class="filter-item">
          <label>Perioada:</label>
          <select id="time-period">
            <option value="2025-H2">Iulie - Decembrie 2025</option>
            <option value="2026-H1">Ianuarie - Martie 2026</option>
          </select>
        </div>
        <div class="filter-item">
          <label>Filtru Zonă:</label>
          <select id="zone-filter">
            <option value="toate">Toate Zonele (Focșani)</option>
            <option value="1">Zona 1 - Centru</option>
            <option value="2">Zona 2 - Obor</option>
            <option value="3">Zona 3 - Est</option>
            <option value="4">Zona 4 - Vest</option>
            <option value="5">Zona 5 - Sud</option>
            <option value="6">Zona 6 - Mîndrești</option>
          </select>
        </div>
      </div>
    </div>

    <main class="app-container">
      <aside class="side-panel">
        <div id="panel-default-view">
          <div class="summary-card">
            <h2 id="view-title">Vedere Generală</h2>
            <p id="view-subtitle">Toate investițiile raportate în municipiu.</p>
          </div>

          <div class="stats-grid">
            <div class="stat-box">
              <span class="stat-label">Total Buget</span>
              <span id="total-amount" class="stat-value">0 RON</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">Nr. Lucrări</span>
              <span id="total-count" class="stat-value">0</span>
            </div>
          </div>
        </div>

        <div class="search-wrapper">
          <input
            type="text"
            id="search-input"
            placeholder="Caută lucrare sau stradă..."
          />
        </div>

        <div id="investment-list" class="list-container"></div>
      </aside>

      <section id="map-canvas"></section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="harta-investitii/js/config-zone.js"></script>
    <script src="harta-investitii/js/dashboard.js"></script>
  </body>
</html>
