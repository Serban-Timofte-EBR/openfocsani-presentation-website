<!DOCTYPE html>
<html lang="ro" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Harta Banilor | Open Focșani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        #map-canvas { touch-action: pan-x pan-y; }
        /* Asigură scroll fluid pe iOS */
        .overflow-y-auto { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="h-full flex flex-col bg-white overflow-hidden">

    <header class="h-16 border-b border-slate-200 flex items-center shrink-0 z-[100] bg-white">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <a href="index.html" class="flex flex-col">
                <span class="font-bold text-slate-900 leading-none">Open Focșani</span>
                <span class="text-[10px] text-slate-500 uppercase tracking-wider font-bold">Audit Civic</span>
            </a>
            <nav class="hidden md:flex items-center space-x-6 text-sm font-medium">
                <a href="index.html" class="hover:text-blue-600">Acasă</a>
                <a href="harta-investitii.html" class="text-blue-600 font-bold">Harta Banilor</a>
                <a href="contact.html" class="hover:text-blue-600">Contact</a>
            </nav>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <section class="flex-1 relative h-[40%] md:h-full order-1 md:order-2 border-b md:border-b-0 border-slate-200">
            <div id="map-canvas" class="h-full w-full"></div>
        </section>

        <aside class="w-full md:w-[400px] bg-white flex flex-col order-2 md:order-1 h-[60%] md:h-full z-50">
            
            <div class="p-5 border-b border-slate-100 shrink-0 shadow-sm">
                <h1 class="text-xl font-black text-slate-900 leading-tight">Analiză Bugetară</h1>
                
                <div class="grid grid-cols-2 gap-3 mt-4">
                    <div class="bg-blue-50 p-3 rounded-xl">
                        <p class="text-[9px] font-bold text-blue-400 uppercase">Investit</p>
                        <p id="total-amount" class="text-sm font-black text-blue-700">0 RON</p>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Proiecte</p>
                        <p id="total-count" class="text-sm font-black text-slate-800">0</p>
                    </div>
                </div>

                <div class="flex flex-col gap-2 mt-4">
                    <select id="time-period" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-bold outline-none focus:border-blue-500">
                        <option value="all">Toate datele</option>
                        <option value="2025-H2">Iulie - Decembrie 2025</option>
                        <option value="2026-H1">Ianuarie - Martie 2026</option>
                    </select>
                    <select id="zone-filter" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-xs font-bold outline-none focus:border-blue-500">
                        <option value="toate">Focșani (Toate Zonele)</option>
                        <option value="1">Zona 1 - Centru</option>
                        <option value="2">Zona 2 - Obor</option>
                        <option value="3">Zona 3 - Est</option>
                        <option value="4">Zona 4 - Vest</option>
                        <option value="5">Zona 5 - Sud</option>
                        <option value="6">Zona 6 - Mîndrești</option>
                    </select>
                </div>
            </div>

            <div id="investment-list" class="flex-1 overflow-y-auto divide-y divide-slate-50 pb-20">
                </div>
        </aside>

    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="harta-investitii/js/dashboard.js"></script>
</body>
</html>
